<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXLSTUDIO — Journal</title>
    <link rel="icon" type="image/png" sizes="32x32" href="hcf.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,700;9..40,900&display=swap" rel="stylesheet">
    
    <!-- Preload landing image -->
    <link rel="preload" as="image" href="priest.png">
    <style>
        :root {
            --accent: #B100FF;
            --bg: #090909;
            --text: #edece9;
            --border: rgba(255,255,255,0.07);
            --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --header-h: 80px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { color-scheme: dark; scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
        }
        a { color: inherit; text-decoration: none; }
        button { background: none; border: none; color: inherit; font: inherit; cursor: none; }
        .grain {
            position: fixed; inset: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.015; pointer-events: none; z-index: 9998;
            animation: grain-anim 0.4s steps(2) infinite;
        }
        @keyframes grain-anim {
            0%{transform:translate(0,0)}20%{transform:translate(-3%,-2%)}40%{transform:translate(3%,-2%)}
            60%{transform:translate(-2%,3%)}80%{transform:translate(2%,3%)}100%{transform:translate(0,0)}
        }
        #cursor-dot {
            position:fixed;top:0;left:0;width:6px;height:6px;background:var(--accent);
            border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);
            transition:width .25s,height .25s,background .25s;
        }
        #cursor-ring {
            position:fixed;top:0;left:0;width:38px;height:38px;
            border:1.5px solid rgba(177,0,255,.45);border-radius:50%;
            pointer-events:none;z-index:99998;transform:translate(-50%,-50%);
        }
        #cursor-dot.is-hover{width:10px;height:10px;background:#fff;}
        @media(hover:none),(max-width:768px){#cursor-dot,#cursor-ring{display:none!important}body,button{cursor:auto}}
        .header {
            position:fixed;top:0;left:0;right:0;z-index:1000;
            height:var(--header-h);padding:0 5vw;
            display:flex;align-items:center;justify-content:space-between;
            background:rgba(9,9,9,.88);backdrop-filter:blur(18px);
        }
        .logo-text{font-size:1rem;font-weight:900;letter-spacing:.35em;text-transform:uppercase;color:#fff;white-space:nowrap;}
        .nav-menu{list-style:none;display:flex;gap:2.5rem;}
        .nav-menu a{
            font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
            color:rgba(255,255,255,.4);transition:color .3s;cursor:none;
        }
        .nav-menu a:hover{color:#fff;}
        .scroll-wrapper { padding-top: var(--header-h); min-height: 100vh; }

        /* Hero section – uses same bg as body */
        .hero {
            min-height: 100vh;
            position: relative;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(9,9,9,1) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            max-width: 800px;
            padding: 2rem;
        }

        /* Agency-style format: tagline + headline (matches index.html agency section) */
        .hero-tagline {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.6rem;
        }
        .hero-headline {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(2.75rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.03em;
            color: #e4dcd2;
        }

        /* Devlog document: readable width, centered, works on all screen sizes */
        .devlog-doc {
            /* Cap width for readable line length (≈ 65–75 characters) */
            max-width: min(720px, 100%);
            width: 100%;
            margin: 0 auto;
            /* Symmetric padding so text never touches edges on any screen */
            padding: 4rem 2rem 5rem;
            font-family: Georgia, 'Times New Roman', serif;
            text-align: left;
            box-sizing: border-box;
            /* Long words/URLs wrap instead of overflowing on small screens */
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .doc-chapter {
            margin-bottom: 3rem;
        }
        .doc-chapter h2 {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #e4dcd2;
            margin-top: 0.5rem;
            margin-bottom: 1.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.95;
        }
        .devlog-doc p {
            font-size: 1.125rem;
            line-height: 1.85;
            color: #e4dcd2;
            margin-bottom: 1.5rem;
        }
        .devlog-doc p:first-of-type { margin-top: 0; }
        .devlog-doc strong {
            font-weight: 700;
            color: #e4dcd2;
        }
        .devlog-doc a {
            color: #8a53f7;
            text-decoration: underline;
            text-underline-offset: 0.15em;
        }
        .devlog-doc a:hover { color: #b794f6; }
        .doc-meta {
            font-size: 0.875rem;
            color: rgba(228, 220, 210, 0.6);
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(228, 220, 210, 0.2);
        }
        .doc-meta span { margin-right: 1.25rem; }
        /* Markdown-rendered content (from creation-process.md), left-aligned */
        .md-content {
            text-align: left;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
            color: #e4dcd2;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            letter-spacing: 0.08em;
        }
        .md-content h1 { font-size: 1.5rem; text-transform: uppercase; }
        .md-content h2 { font-size: 1.25rem; text-transform: uppercase; }
        .md-content h3 { font-size: 1.1rem; }
        .md-content h4 { font-size: 1rem; font-weight: 600; }
        .md-content p {
            font-size: 1.125rem;
            line-height: 1.85;
            color: #e4dcd2;
            margin-bottom: 1.5rem;
        }
        .md-content ul, .md-content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
            color: #e4dcd2;
        }
        .md-content li { margin-bottom: 0.5rem; }
        .md-content a { color: #8a53f7; text-decoration: underline; text-underline-offset: 0.15em; }
        .md-content a:hover { color: #b794f6; }
        .md-content code {
            background: rgba(228, 220, 210, 0.15);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.95em;
            color: #e4dcd2;
            /* Code can break on very small screens if needed */
            overflow-wrap: break-word;
        }
        .md-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            -webkit-overflow-scrolling: touch;
        }
        .md-content pre code { background: none; padding: 0; }
        .md-content .loading { color: rgba(228, 220, 210, 0.6); font-style: italic; }
        /* Day articles: same folder as Events Timeline articles (list + blocks) */
        .creation-process-days { max-width: 720px; margin: 0 auto; }
        .days-list { display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(228, 220, 210, 0.2); }
        .days-list a { color: #e4dcd2; text-decoration: none; font-weight: 500; font-size: 0.95rem; }
        .days-list a:hover { text-decoration: underline; color: #fff; }
        .day-article { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(228, 220, 210, 0.15); }
        .day-article:last-child { border-bottom: none; }
        .day-article .day-title { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 1.35rem; font-weight: 700; color: #e4dcd2; margin-bottom: 1rem; letter-spacing: 0.02em; }
        .day-article .day-body { font-size: 1.0625rem; line-height: 1.8; color: #e4dcd2; }
        .day-article .day-body p { margin-bottom: 1.25rem; }
        .day-article .day-body h2, .day-article .day-body h3, .day-article .day-body h4 {
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            color: #e4dcd2;
            font-weight: 700;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .day-article .day-body ul, .day-article .day-body ol { margin: 1rem 0 1rem 1.5rem; padding-left: 1.5rem; }
        .day-article .day-body li { margin-bottom: 0.35rem; }
        .day-article .day-body a { color: #8a53f7; text-decoration: underline; text-underline-offset: 0.15em; }
        .day-article .day-body code { background: rgba(228, 220, 210, 0.15); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.95em; }
        .visit-website-btn,
        .cta-youtube {
            background: rgba(228, 220, 210, 0.1);
            color: #e4dcd2;
            border-color: rgba(228, 220, 210, 0.3);
        }
        .visit-website-btn:hover,
        .cta-youtube:hover {
            background: rgba(228, 220, 210, 0.2);
            border-color: rgba(228, 220, 210, 0.5);
        }
        /* Background color picker in header */
        .header-controls { display: flex; align-items: center; gap: 1rem; }
        .bg-bar { display: flex; align-items: center; gap: 0.5rem; }
        .bg-bar-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
        .bg-color-picker {
            width: 32px; height: 32px; padding: 0;
            border: 2px solid rgba(255,255,255,0.4); border-radius: 6px;
            cursor: pointer; background: transparent;
        }
        .bg-color-picker::-webkit-color-swatch-wrapper { padding: 2px; }
        .bg-color-picker::-webkit-color-swatch { border: none; border-radius: 4px; }
        .bg-color-picker::-moz-color-swatch { border: none; border-radius: 4px; }
        .cta-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .cta-buttons .visit-website-btn { margin-left: 0; margin-right: 0; }
        /* CTA buttons: GitHub-style on light grey */
        .visit-website-btn {
            display: inline-block;
            background: #f6f8fa;
            color: #24292f;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            margin-top: 1rem;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #d0d7de;
        }
        .visit-website-btn:hover {
            background: #eaeef2;
            border-color: #8c959f;
        }
        .cta-youtube {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            color: #24292f;
        }
        .cta-youtube:hover {
            background: #eaeef2;
            border-color: #8c959f;
        }

        /* Main wrapper – uses same bg as body */
        .main-wrapper {
            position: relative;
            z-index: 1;
            background: var(--bg);
        }

        /* Large photos section - transparent, white text */
        .large-photos {
            padding: 4rem 0;
            background: transparent;
        }

        .photo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .photo-item {
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }

        .photo-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .photo-caption {
            text-align: center;
            margin-top: 1rem;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-style: italic;
        }

        /* Back button */
        .back-button {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.95);
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 400;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-button:hover {
            background: rgba(0, 0, 0, 0.85);
            color: rgba(255, 255, 255, 1);
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Responsive: same article padding and font scaling on all screens */
        @media (max-width: 768px) {
            .header {
                padding: 1rem 2rem;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                height: 70px;
                gap: 0;
            }
            .bg-bar-label { display: none; }
            .bg-color-picker { width: 28px; height: 28px; }
            .logo-container { flex-direction: column; align-items: flex-start; }
            .logo { font-size: 1rem; line-height: 1; }
            .logo-subtitle { font-size: 0.7rem; margin-top: 0.1rem; }
            .nav-menu { gap: 1.5rem; margin: 0; justify-content: flex-end; }
            .nav-menu a { font-size: 0.9rem; }
            /* Slightly less vertical padding, keep horizontal so text doesn’t touch edges */
            .devlog-doc {
                padding: 3rem 1.5rem 4rem;
            }
            .doc-chapter h2 { font-size: 1.15rem; }
            .devlog-doc p { font-size: 1.0625rem; }
            .md-content h1 { font-size: 1.35rem; }
            .md-content h2 { font-size: 1.15rem; }
            .md-content h3 { font-size: 1.05rem; }
            .md-content h4 { font-size: 0.95rem; }
            .md-content p { font-size: 1.0625rem; }
            .photo-container { padding: 0 1rem; }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.8rem 1rem;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                height: 60px;
                gap: 0;
            }
            .logo-container { flex-direction: column; align-items: flex-start; }
            .logo { font-size: 0.9rem; line-height: 1; }
            .logo-subtitle { font-size: 0.6rem; margin-top: 0.05rem; }
            .nav-menu { gap: 1rem; margin: 0; justify-content: flex-end; }
            .nav-menu a { font-size: 0.8rem; }
            /* Minimum horizontal padding so text never touches screen edges */
            .devlog-doc {
                padding: 2.5rem 1rem 3rem;
            }
            .doc-chapter h2 { font-size: 1.05rem; }
            .devlog-doc p { font-size: 1rem; line-height: 1.75; }
            .md-content h1 { font-size: 1.2rem; }
            .md-content h2 { font-size: 1.05rem; }
            .md-content h3 { font-size: 1rem; }
            .md-content h4 { font-size: 0.9rem; }
            .md-content p { font-size: 1rem; line-height: 1.75; }
            .md-content ul, .md-content ol { padding-left: 1.25rem; }
            .hero-content { padding: 1rem; }
        }
    </style>
</head>

<div id="cursor-dot" aria-hidden="true"></div>
<div id="cursor-ring" aria-hidden="true"></div>
<header class="header">
    <a href="index.html" class="logo-text">IXLSTUDIO</a>
    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>

</header>
<div class="scroll-wrapper">
<div class="main-wrapper">

    <!-- Hero section -->
    <section class="hero">

        <div class="hero-overlay"></div>
        <div class="hero-content hero-agency-format">
            <p class="hero-tagline">Making of</p>

        </div>
    </section>

    <!-- Devlog document -->
    <article class="devlog-doc">
        <section class="doc-chapter">
            <!-- <h2>0. Introduction</h2> -->
            <p>Welcome to the journal of THE OBSERVER. </p>
        </section>

        <section class="doc-chapter">
            <h2>Making of</h2>
            <!-- Content loaded from creation-process.md (same folder as this page) -->
            <div id="creation-process-content" class="md-content">
                <p class="loading">Loading…</p>
            </div>
        </section>

    </article>

    </div><!-- .main-wrapper -->

    <script>
        // Inline markdown parser (no CDN): headings, bold, italic, links, code, lists, paragraphs
        function parseMarkdown(md) {
            var html = '';
            var lines = md.replace(/\r\n/g, '\n').split('\n');
            var i = 0;
            var inList = false;
            var listTag = '';
            function closeList() {
                if (inList) { html += listTag === 'ul' ? '</ul>' : '</ol>'; inList = false; }
            }
            function escapeHtml(s) {
                return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }
            function inlineParse(s) {
                return s
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
            }
            while (i < lines.length) {
                var line = lines[i];
                var trimmed = line.trim();
                if (/^####\s/.test(trimmed)) {
                    closeList();
                    html += '<h4>' + inlineParse(escapeHtml(trimmed.slice(5))) + '</h4>';
                } else if (/^###\s/.test(trimmed)) {
                    closeList();
                    html += '<h3>' + inlineParse(escapeHtml(trimmed.slice(4))) + '</h3>';
                } else if (/^##\s/.test(trimmed)) {
                    closeList();
                    html += '<h2>' + inlineParse(escapeHtml(trimmed.slice(3))) + '</h2>';
                } else if (/^#\s/.test(trimmed)) {
                    closeList();
                    html += '<h1>' + inlineParse(escapeHtml(trimmed.slice(2))) + '</h1>';
                } else if (/^[-*]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
                    var tag = /^\d+\.\s/.test(trimmed) ? 'ol' : 'ul';
                    if (!inList || listTag !== tag) { closeList(); html += tag === 'ol' ? '<ol>' : '<ul>'; inList = true; listTag = tag; }
                    var content = trimmed.replace(/^[-*]\s/, '').replace(/^\d+\.\s/, '');
                    html += '<li>' + inlineParse(escapeHtml(content)) + '</li>';
                } else if (trimmed === '') {
                    closeList();
                    html += '\n';
                } else {
                    closeList();
                    html += '<p>' + inlineParse(escapeHtml(trimmed)) + '</p>';
                }
                i++;
            }
            closeList();
            return html;
        }

        // Split creation-process.md by "# Day 1", "# Day 2", ... and render each as an article-like block
        (function() {
            var container = document.getElementById('creation-process-content');
            if (!container) return;
            fetch('creation-process.md')
                .then(function(r) {
                    if (!r.ok) throw new Error('Could not load creation-process.md');
                    return r.text();
                })
                .then(function(md) {
                    var raw = md.replace(/\r\n/g, '\n').trim();
                    // Split at lines that start with "# Day " followed by digits (optional rest of line)
                    var segments = raw.split(/\n(?=# Day \d+)/);
                    var listHtml = '';
                    var articlesHtml = '';
                    for (var i = 0; i < segments.length; i++) {
                        var seg = segments[i].trim();
                        if (!seg) continue;
                        var firstLineEnd = seg.indexOf('\n');
                        var firstLine = firstLineEnd >= 0 ? seg.slice(0, firstLineEnd) : seg;
                        var bodyRaw = firstLineEnd >= 0 ? seg.slice(firstLineEnd + 1).trim() : '';
                        // First line is e.g. "# Day 1" or "# Day 1 06 March 2026" – use as title
                        var title = firstLine.replace(/^#\s*/, '').trim();
                        var dayNum = (i + 1);
                        var slug = 'day-' + dayNum;
                        listHtml += '<a href="#' + slug + '">' + escapeHtml(title) + '</a>';
                        var bodyHtml = bodyRaw ? parseMarkdown(bodyRaw) : '<p class="loading">(No content yet.)</p>';
                        articlesHtml += '<article class="day-article" id="' + slug + '"><h2 class="day-title">' + escapeHtml(title) + '</h2><div class="day-body">' + bodyHtml + '</div></article>';
                    }
                    if (!listHtml && !articlesHtml) {
                        container.innerHTML = '<p class="loading">Add entries in <strong>creation-process.md</strong> using <code># Day 1</code>, <code># Day 2</code>, etc. Each heading starts a new article.</p>';
                        return;
                    }
                    container.innerHTML = '<div class="creation-process-days"><nav class="days-list" aria-label="Days">' + listHtml + '</nav><div class="day-articles">' + articlesHtml + '</div></div>';
                    // Keep day navigation out of browser history so Back goes to index.html.
                    var dayLinks = container.querySelectorAll('.days-list a[href^="#"]');
                    dayLinks.forEach(function(link) {
                        link.addEventListener('click', function(ev) {
                            ev.preventDefault();
                            var targetId = (link.getAttribute('href') || '').slice(1);
                            if (!targetId) return;
                            var targetEl = document.getElementById(targetId);
                            if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        });
                    });
                })
                .catch(function() {
                    container.innerHTML = '<p class="loading">Place <strong>creation-process.md</strong> in the same folder as this page. It will be displayed here.</p>';
                });
            function escapeHtml(s) {
                return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }
        })();

        // Intersection Observer for photo animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.addEventListener('DOMContentLoaded', function() {
            const photoItems = document.querySelectorAll('.photo-item');
            photoItems.forEach(item => observer.observe(item));
        });
        // Always navigate directly to home when clicking the header logo.
    </script>
    <script>
        // Sync accent from index.html color picker
        (function() {
            var accent = localStorage.getItem('index-bg') || '#B100FF';
            document.documentElement.style.setProperty('--accent', accent);
        })();
        (function() {
            const dot = document.getElementById('cursor-dot');
            const ring = document.getElementById('cursor-ring');
            if (!dot || !ring || window.matchMedia('(hover:none)').matches) return;
            let mx = 0, my = 0, rx = 0, ry = 0;
            window.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; dot.style.transform = 'translate('+mx+'px,'+my+'px) translate(-50%,-50%)'; });
            (function loop() { rx += (mx-rx)*.12; ry += (my-ry)*.12; ring.style.transform = 'translate('+rx+'px,'+ry+'px) translate(-50%,-50%)'; requestAnimationFrame(loop); })();
            document.querySelectorAll('a,button').forEach(function(el) {
                el.addEventListener('mouseenter', function() { dot.classList.add('is-hover'); ring.style.width='56px'; ring.style.height='56px'; });
                el.addEventListener('mouseleave', function() { dot.classList.remove('is-hover'); ring.style.width='38px'; ring.style.height='38px'; });
            });
        })();
    </script>
    </div><!-- .scroll-wrapper -->
</body>
</html>
