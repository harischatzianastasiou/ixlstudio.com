<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXLSTUDIO — Moodboard</title>
    <link rel="icon" type="image/png" sizes="32x32" href="hcf.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,700;9..40,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #B100FF;
            --bg: #090909;
            --text: #edece9;
            --border: rgba(255,255,255,0.07);
            --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --header-h: 80px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { color-scheme: dark; scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
        }
        a { color: inherit; text-decoration: none; }
        button { background: none; border: none; color: inherit; font: inherit; cursor: none; }
        /* Grain */
        .grain {
            position: fixed; inset: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.015; pointer-events: none; z-index: 9998;
            animation: grain-anim 0.4s steps(2) infinite; will-change: transform;
        }
        @keyframes grain-anim {
            0%   { transform: translate(0,0); } 20%  { transform: translate(-3%,-2%); }
            40%  { transform: translate(3%,-2%); } 60%  { transform: translate(-2%,3%); }
            80%  { transform: translate(2%,3%); } 100% { transform: translate(0,0); }
        }
        /* Cursor */
        #cursor-dot {
            position: fixed; top:0; left:0; width:6px; height:6px;
            background: var(--accent); border-radius:50%; pointer-events:none;
            z-index:99999; transform:translate(-50%,-50%);
            transition: width .25s, height .25s, background .25s; will-change: transform;
        }
        #cursor-ring {
            position: fixed; top:0; left:0; width:38px; height:38px;
            border: 1.5px solid rgba(177,0,255,.45); border-radius:50%;
            pointer-events:none; z-index:99998; transform:translate(-50%,-50%); will-change:transform;
        }
        #cursor-dot.is-hover { width:10px; height:10px; background:#fff; }
        @media (hover:none),(max-width:768px) { #cursor-dot,#cursor-ring { display:none!important; } body,button { cursor:auto; } }
        /* Header */
        .header {
            position: fixed; top:0; left:0; right:0; z-index:1000;
            height: var(--header-h); padding: 0 5vw;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(9,9,9,.88); backdrop-filter: blur(18px);
        }
        .logo-text{font-size:1rem;font-weight:900;letter-spacing:.35em;text-transform:uppercase;color:#fff;white-space:nowrap;}
        .nav-menu { list-style:none; display:flex; gap:2.5rem; }
        .nav-menu a {
            font-size:.68rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
            color:rgba(255,255,255,.4); transition:color .3s; cursor:none;
        }
        .nav-menu a:hover { color:#fff; }
        .scroll-wrapper {
            padding-top: var(--header-h);
            min-height: 100vh;
        }
        .moodboard-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 2rem 4rem;
        }
        .moodboard-main h1 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #e4dcd2;
            margin-bottom: 2rem;
            text-align: center;
        }
        .moodboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .moodboard-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .moodboard-item:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
        }
        .moodboard-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 0.3s ease;
        }
        .moodboard-item:hover img {
            filter: brightness(1.1);
        }
        .moodboard-item.video-item {
            aspect-ratio: 16 / 9;
        }
        .moodboard-item.video-item iframe {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }
        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover {
            opacity: 1;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,255,255,0.5);
        }
        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .moodboard-main { padding: 2rem 5vw 5rem; }
        .moodboard-main h1 {
            font-size: clamp(2rem, 5vw, 4rem); font-weight: 900;
            letter-spacing: -.04em; text-transform: uppercase;
            color: #fff; margin-bottom: 2.5rem;
        }
        @media (max-width: 768px) {
            .moodboard-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div id="cursor-dot" aria-hidden="true"></div>
<div id="cursor-ring" aria-hidden="true"></div>
<header class="header">
    <a href="index.html" class="logo-text">IXLSTUDIO</a>
</header>
<div class="scroll-wrapper">
    <main class="moodboard-main">
            <h1>Moodboard</h1>

            <div class="moodboard-grid" id="moodboard-grid">
                <div class="moodboard-item video-item">
                    <iframe src="https://www.youtube.com/embed/HglXDxMdSfM" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="moodboard-item video-item">
                    <iframe src="https://www.youtube.com/embed/8HXMl6mAlFk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="moodboard-item video-item">
                    <iframe src="https://www.youtube.com/embed/3lfgsLvgTtE" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="moodboard-item video-item">
                    <iframe src="https://www.youtube.com/embed/tqoaDVa9cbM" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="moodboard-item video-item">
                    <iframe src="https://www.youtube.com/embed/H5NZtbbiyKM" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </main>
    </div>

    <!-- Lightbox for full-size image viewing -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="Full size image" id="lightbox-img">
    </div>

    <script>
        // Sync accent from index.html color picker
        (function() {
            var accent = localStorage.getItem('index-bg') || '#B100FF';
            document.documentElement.style.setProperty('--accent', accent);
        })();
        // Cursor
        (function() {
            const dot = document.getElementById('cursor-dot');
            const ring = document.getElementById('cursor-ring');
            if (!dot || !ring || window.matchMedia('(hover:none)').matches) return;
            let mx = 0, my = 0, rx = 0, ry = 0;
            window.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; dot.style.transform = 'translate(' + mx + 'px,' + my + 'px) translate(-50%,-50%)'; });
            (function loop() { rx += (mx-rx)*.12; ry += (my-ry)*.12; ring.style.transform = 'translate(' + rx + 'px,' + ry + 'px) translate(-50%,-50%)'; requestAnimationFrame(loop); })();
            document.querySelectorAll('a,button').forEach(function(el) {
                el.addEventListener('mouseenter', function() { dot.classList.add('is-hover'); ring.style.width = '56px'; ring.style.height = '56px'; });
                el.addEventListener('mouseleave', function() { dot.classList.remove('is-hover'); ring.style.width = '38px'; ring.style.height = '38px'; });
            });
        })();

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        document.querySelectorAll('.moodboard-item img').forEach(function(img) {
            img.addEventListener('click', function() { lightboxImg.src = this.src; lightbox.classList.add('active'); });
        });
        lightbox.addEventListener('click', function() { lightbox.classList.remove('active'); });
    </script>
</body>
</html>
